name: Build Check (no deploy)

on:
  pull_request:
  push:
    branches-ignore: [main]

env:
  ANCHOR_VERSION: "0.30.1"
  SOLANA_VERSION: "v1.18.8"

jobs:
  build:
    name: Verify programs compile
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --version ${{ env.ANCHOR_VERSION }} anchor-cli --locked

      - name: Build
        run: anchor build

      - name: List compiled programs
        run: ls -lh target/deploy/*.so
