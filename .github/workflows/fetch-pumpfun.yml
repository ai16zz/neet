name: Fetch Pump.fun Dev Stats
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  fetch-pumpfun:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pump.fun dev stats
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import json, datetime, time, requests

          HDRS = {
              'Accept': 'application/json',
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
          }
          BASE_URLS = [
              'https://frontend-api-v3.pump.fun',
              'https://frontend-api.pump.fun',
          ]

          def try_get(url, label=''):
              try:
                  r = requests.get(url, headers=HDRS, timeout=15)
                  print(f"  {label} status={r.status_code} len={len(r.text)}", flush=True)
                  if r.status_code == 200:
                      return r.json()
                  else:
                      print(f"  {label} body: {r.text[:200]}", flush=True)
              except Exception as e:
                  print(f"  {label} error: {e}", flush=True)
              return None

          # Fetch recent coins - try v3 first
          all_coins = []
          for base in BASE_URLS:
              found = False
              for sort in ['last_trade_timestamp', 'market_cap', 'created_timestamp']:
                  url = f"{base}/coins?offset=0&limit=50&sort={sort}&order=DESC&includeNsfw=false"
                  data = try_get(url, f"{base.split('//')[1].split('.')[1]}/{sort}")
                  if data is not None:
                      coins = data if isinstance(data, list) else data.get('coins', data.get('data', []))
                      if coins:
                          all_coins.extend(coins)
                          print(f"  got {len(coins)} coins from {base}", flush=True)
                          found = True
              if found:
                  break

          # Deduplicate
          seen = set()
          unique = []
          for c in all_coins:
              m = c.get('mint', '')
              if m and m not in seen:
                  seen.add(m)
                  unique.append(c)
          print(f"Unique tokens: {len(unique)}", flush=True)

          dev_cache = {}
          token_stats = {}

          for coin in unique:
              mint = coin.get('mint', '')
              creator = coin.get('creator', '')
              if not mint or not creator:
                  continue
              if creator not in dev_cache:
                  cc_data = None
                  for base in BASE_URLS:
                      url = f"{base}/coins/user-created-coins/{creator}?offset=0&limit=200&includeNsfw=false"
                      cc_data = try_get(url, f"dev_{base.split('.')[0][-2:]}")
                      if cc_data is not None:
                          break
                  cc = []
                  if cc_data is not None:
                      cc = cc_data if isinstance(cc_data, list) else cc_data.get('coins', [])
                  total = len(cc)
                  grad = sum(1 for x in cc if x.get('complete') or x.get('raydium_pool'))
                  rate = round(grad / total * 100) if total > 0 else 0
                  dev_cache[creator] = {"total": total, "grad": grad, "rate": rate}
                  print(f"  dev {creator[:8]}: {grad}/{total}={rate}%", flush=True)
                  time.sleep(0.15)
              s = dev_cache.get(creator, {})
              rate = s.get('rate', 0)
              total = s.get('total', 0)
              rank = 'elite' if rate >= 70 else 'good' if rate >= 40 else 'avg' if rate >= 20 else ('new' if total < 3 else 'rug')
              token_stats[mint] = {
                  "devRate": rate, "devGrad": s.get('grad', 0),
                  "devTotal": total, "devRank": rank, "creator": creator[:8]
              }

          # Graduated coins
          grads = []
          for base in BASE_URLS:
              url = f"{base}/coins?offset=0&limit=50&sort=last_trade_timestamp&order=DESC&includeNsfw=false&complete=true"
              data = try_get(url, 'grads')
              if data is not None:
                  raw = data if isinstance(data, list) else data.get('coins', data.get('data', []))
                  grads = [{'mint': c.get('mint',''), 'name': c.get('name',''), 'symbol': c.get('symbol',''),
                            'usd_market_cap': c.get('usd_market_cap', 0)} for c in raw]
                  if grads:
                      break
          print(f"Grads: {len(grads)}", flush=True)

          json.dump({"updated": datetime.datetime.utcnow().isoformat(),
                     "tokenCount": len(token_stats), "devCount": len(dev_cache),
                     "tokens": token_stats}, open('neet-dev-stats.json', 'w'))
          json.dump({"data": grads, "last_updated": datetime.datetime.utcnow().isoformat(),
                     "count": len(grads)}, open('pumpfun-grads.json', 'w'))
          print(f"Done: {len(token_stats)} tokens, {len(dev_cache)} devs, {len(grads)} grads", flush=True)
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "nansen-bot@github.com"
          git config user.name "Nansen Data Bot"
          git add neet-dev-stats.json pumpfun-grads.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "data: update pumpfun dev stats [skip ci]" && git push)
