name: Fetch Pump.fun Dev Stats
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  fetch-pumpfun:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pump.fun dev stats
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import json, os, datetime, time, requests

          HDRS = {
              'Accept': 'application/json',
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
          }
          BASE = 'https://frontend-api-v3.pump.fun'

          def fetch(url):
              try:
                  r = requests.get(url, headers=HDRS, timeout=15)
                  print(f"  {url.split('?')[0].split('pump.fun')[1]} status={r.status_code}", flush=True)
                  if r.status_code == 200:
                      return r.json()
              except Exception as e:
                  print(f"  error: {e}", flush=True)
              return None

          existing_tokens = {}
          existing_creators = {}
          if os.path.exists('neet-dev-stats.json'):
              try:
                  with open('neet-dev-stats.json') as f:
                      prev = json.load(f)
                  existing_tokens = prev.get('tokens', {})
                  for mint, td in existing_tokens.items():
                      c = td.get('creator', '')
                      if c and len(c) >= 8:
                          if c not in existing_creators:
                              existing_creators[c] = {'total': td.get('devTotal', 0), 'grad': td.get('devGrad', 0)}
                  print(f"Loaded existing: {len(existing_tokens)} tokens, {len(existing_creators)} creators", flush=True)
              except Exception as e:
                  print(f"  could not load existing data: {e}", flush=True)

          all_coins = []
          for sort in ['last_trade_timestamp', 'market_cap', 'created_timestamp', 'bump_order']:
              for offset in [0, 50, 100]:
                  data = fetch(f"{BASE}/coins?offset={offset}&limit=50&sort={sort}&order=DESC&includeNsfw=false")
                  if data is not None:
                      coins = data if isinstance(data, list) else data.get('coins', data.get('data', []))
                      all_coins.extend(coins)
                      print(f"  {sort}@{offset}: {len(coins)} coins", flush=True)
                  time.sleep(0.3)

          seen_new = set()
          unique_new = []
          for c in all_coins:
              m = c.get('mint', '')
              if m and m not in seen_new:
                  seen_new.add(m)
                  unique_new.append(c)
          print(f"Unique new tokens in fetch: {len(unique_new)}", flush=True)

          truly_new = [c for c in unique_new if c.get('mint', '') not in existing_tokens]
          print(f"Truly new (not in existing): {len(truly_new)}", flush=True)

          new_creator_coins = {}
          for c in truly_new:
              creator = c.get('creator', '')
              if creator:
                  new_creator_coins.setdefault(creator, []).append(c)

          merged_creators = dict(existing_creators)
          for creator, coins in new_creator_coins.items():
              new_total = len(coins)
              new_grad = sum(1 for x in coins if x.get('complete') or x.get('raydium_pool'))
              if creator in merged_creators:
                  merged_creators[creator]['total'] += new_total
                  merged_creators[creator]['grad']  += new_grad
              else:
                  merged_creators[creator] = {'total': new_total, 'grad': new_grad}

          def mk_rank(total, grad):
              rate = round(grad / total * 100) if total > 0 else 0
              rank = ('elite' if rate >= 70 and total >= 3 else
                      'good'  if rate >= 40 and total >= 2 else
                      'avg'   if rate >= 20 else
                      'new'   if total < 3  else 'rug')
              return rate, rank

          token_stats = dict(existing_tokens)

          mint_to_creator = {}
          for c in unique_new:
              mint = c.get('mint', '')
              creator = c.get('creator', '')
              if mint and creator:
                  mint_to_creator[mint] = creator

          for mint, td in list(token_stats.items()):
              full_creator = mint_to_creator.get(mint)
              if full_creator and full_creator in merged_creators:
                  mc = merged_creators[full_creator]
                  rate, rank = mk_rank(mc['total'], mc['grad'])
                  token_stats[mint] = {
                      "devRate": rate, "devGrad": mc['grad'],
                      "devTotal": mc['total'], "devRank": rank,
                      "creator": full_creator[:8]
                  }

          for c in truly_new:
              mint = c.get('mint', '')
              creator = c.get('creator', '')
              if not mint or not creator:
                  continue
              mc = merged_creators.get(creator, {'total': 1, 'grad': 0})
              rate, rank = mk_rank(mc['total'], mc['grad'])
              token_stats[mint] = {
                  "devRate": rate, "devGrad": mc['grad'],
                  "devTotal": mc['total'], "devRank": rank,
                  "creator": creator[:8]
              }

          print(f"Total tokens accumulated: {len(token_stats)}", flush=True)
          print(f"Total creators tracked: {len(merged_creators)}", flush=True)

          grads = []
          for offset in [0, 50]:
              gd = fetch(f"{BASE}/coins?offset={offset}&limit=50&sort=last_trade_timestamp&order=DESC&includeNsfw=false&complete=true")
              if gd is not None:
                  raw = gd if isinstance(gd, list) else gd.get('coins', gd.get('data', []))
                  grads += [{'mint': c.get('mint',''), 'name': c.get('name',''), 'symbol': c.get('symbol',''),
                              'usd_market_cap': c.get('usd_market_cap', 0)} for c in raw]
              time.sleep(0.3)
          seen_g = set()
          grads_uniq = []
          for g in grads:
              if g['mint'] not in seen_g:
                  seen_g.add(g['mint'])
                  grads_uniq.append(g)
          print(f"Grads: {len(grads_uniq)}", flush=True)

          json.dump({
              "updated": datetime.datetime.utcnow().isoformat(),
              "tokenCount": len(token_stats),
              "devCount": len(merged_creators),
              "tokens": token_stats
          }, open('neet-dev-stats.json', 'w'))

          json.dump({
              "data": grads_uniq,
              "last_updated": datetime.datetime.utcnow().isoformat(),
              "count": len(grads_uniq)
          }, open('pumpfun-grads.json', 'w'))

          print(f"Done: {len(token_stats)} tokens, {len(merged_creators)} creators, {len(grads_uniq)} grads", flush=True)
          PYEOF

      - name: Early Telegram alert on new pump.fun grads
        env:
          TG_TOKEN:  ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, time, sys

          TOKEN = os.environ.get('TG_TOKEN','').strip()
          CHAT  = os.environ.get('TG_CHATID','').strip()
          if not TOKEN or not CHAT:
              print('[EARLY] TG_TOKEN/TG_CHATID missing — skipping alerts', flush=True)
              sys.exit(0)

          try:
              grads = json.load(open('pumpfun-grads.json')).get('data', [])
          except Exception as e:
              print('[EARLY] could not read pumpfun-grads.json:', e, flush=True)
              sys.exit(0)

          os.makedirs('scanner', exist_ok=True)
          state_path = 'scanner/pumpfun-seen.json'
          first_run = not os.path.exists(state_path)
          seen = set()
          if not first_run:
              try:
                  seen = set(json.load(open(state_path)).get('seen', []))
              except Exception:
                  seen = set()

          if first_run:
              seen = {g.get('mint','') for g in grads if g.get('mint')}
              json.dump({'seen': sorted(seen)}, open(state_path,'w'))
              print(f'[EARLY] first run — seeded {len(seen)} grads, no alerts sent', flush=True)
              sys.exit(0)

          new_tokens = [g for g in grads if g.get('mint') and g['mint'] not in seen]
          print(f'[EARLY] grads: {len(grads)} | seen: {len(seen)} | new this run: {len(new_tokens)}', flush=True)

          def http_get(url, timeout=12):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent':'neet-early/1.0'})
                  with urllib.request.urlopen(req, timeout=timeout) as r:
                      return json.loads(r.read().decode())
              except Exception as e:
                  print('[EARLY] http_get failed:', url, e, flush=True)
                  return None

          def send_tg(msg):
              url = f'https://api.telegram.org/bot{TOKEN}/sendMessage'
              body = json.dumps({'chat_id': CHAT, 'text': msg, 'parse_mode':'HTML', 'disable_web_page_preview': False}).encode()
              for attempt in (1,2):
                  try:
                      req = urllib.request.Request(url, data=body, headers={'Content-Type':'application/json'})
                      with urllib.request.urlopen(req, timeout=15) as r:
                          resp = json.loads(r.read().decode())
                          if resp.get('ok'):
                              print(f'[EARLY][TG] sent ok (attempt {attempt})', flush=True)
                              return True
                          print(f'[EARLY][TG] not ok attempt {attempt}: {resp}', flush=True)
                  except urllib.error.HTTPError as e:
                      txt = e.read().decode(errors='ignore')
                      print(f'[EARLY][TG FAIL attempt {attempt}] HTTP {e.code}: {txt}', flush=True)
                      if e.code == 429:
                          try:
                              ra = int(json.loads(txt).get('parameters',{}).get('retry_after',2))
                          except Exception:
                              ra = 2
                          time.sleep(min(ra+1, 10))
                          continue
                      if e.code == 401:
                          return False
                  except Exception as e:
                      print(f'[EARLY][TG FAIL attempt {attempt}] {e}', flush=True)
                  time.sleep(1)
              return False

          def fmt_usd(v):
              try:
                  v = float(v)
                  if v >= 1e6: return f"${v/1e6:.1f}M"
                  if v >= 1e3: return f"${v/1e3:.0f}K"
                  return f"${v:.0f}"
              except Exception:
                  return "$?"

          sent = 0
          cap = 10  # max alerts per run to avoid 429 spam
          for g in new_tokens[:cap]:
              mint = g['mint']
              sym  = (g.get('symbol') or '?').replace('<','').replace('>','')
              name = (g.get('name') or '').replace('<','').replace('>','')
              mc_hint = g.get('usd_market_cap') or 0

              dx = http_get(f'https://api.dexscreener.com/latest/dex/tokens/{mint}')
              pair = None
              if dx and dx.get('pairs'):
                  pairs = [p for p in dx['pairs'] if p.get('chainId')=='solana']
                  pairs.sort(key=lambda p: float((p.get('liquidity') or {}).get('usd') or 0), reverse=True)
                  pair = pairs[0] if pairs else None

              if not pair:
                  print(f'[EARLY] no dex data for {sym} {mint[:8]} — marking seen', flush=True)
                  seen.add(mint); continue

              liq = float((pair.get('liquidity') or {}).get('usd') or 0)
              vol = float((pair.get('volume') or {}).get('h24') or 0)
              mc  = float(pair.get('marketCap') or pair.get('fdv') or mc_hint or 0)
              url = pair.get('url') or f'https://dexscreener.com/solana/{mint}'

              if liq < 5000 or mc < 5000:
                  print(f'[EARLY] below-threshold {sym}: liq={liq:.0f} mc={mc:.0f} — marking seen', flush=True)
                  seen.add(mint); continue

              msg = (f"🚨 <b>EARLY ${sym}</b> (pump.fun grad)\n"
                     f"MC: {fmt_usd(mc)}\n"
                     f"Liq: {fmt_usd(liq)} | Vol: {fmt_usd(vol)}\n"
                     f"{url}")
              if send_tg(msg):
                  sent += 1
                  seen.add(mint)
              else:
                  print(f'[EARLY] send failed for {sym} — leaving unseen for retry', flush=True)
              time.sleep(0.4)

          json.dump({'seen': sorted(seen)}, open(state_path,'w'))
          print(f'[EARLY] done. new: {len(new_tokens)} | sent: {sent}', flush=True)
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "nansen-bot@github.com"
          git config user.name "Nansen Data Bot"
          git add neet-dev-stats.json pumpfun-grads.json scanner/pumpfun-seen.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "data: update pumpfun dev stats + early alerts [skip ci]" && git push)
