name: Fetch Pump.fun Dev Stats
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  fetch-pumpfun:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pump.fun dev stats
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import json, datetime, time, requests

          HDRS = {
              'Accept': 'application/json',
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
          }
          BASE = 'https://frontend-api-v3.pump.fun'

          def fetch(url):
              try:
                  r = requests.get(url, headers=HDRS, timeout=15)
                  print(f"  {url.split('?')[0].split('pump.fun')[1]} status={r.status_code}", flush=True)
                  if r.status_code == 200:
                      return r.json()
              except Exception as e:
                  print(f"  error: {e}", flush=True)
              return None

          # Fetch coins from 4 sort modes to maximize coverage
          all_coins = []
          for sort in ['last_trade_timestamp', 'market_cap', 'created_timestamp', 'bump_order']:
              data = fetch(f"{BASE}/coins?offset=0&limit=50&sort={sort}&order=DESC&includeNsfw=false")
              if data is not None:
                  coins = data if isinstance(data, list) else data.get('coins', data.get('data', []))
                  all_coins.extend(coins)
                  print(f"  {sort}: {len(coins)} coins", flush=True)

          # Deduplicate by mint
          seen = set()
          unique = []
          for c in all_coins:
              m = c.get('mint', '')
              if m and m not in seen:
                  seen.add(m)
                  unique.append(c)
          print(f"Unique tokens in sample: {len(unique)}", flush=True)

          # Group by creator - compute graduation rate from sample
          # complete=True or raydium_pool set means graduated
          creator_coins = {}
          for c in unique:
              creator = c.get('creator', '')
              if not creator:
                  continue
              if creator not in creator_coins:
                  creator_coins[creator] = []
              creator_coins[creator].append(c)

          # Build dev stats for each creator
          dev_stats = {}
          for creator, coins in creator_coins.items():
              total = len(coins)
              grad = sum(1 for x in coins if x.get('complete') or x.get('raydium_pool'))
              rate = round(grad / total * 100) if total > 0 else 0
              rank = 'elite' if rate >= 70 else 'good' if rate >= 40 else 'avg' if rate >= 20 else ('new' if total < 2 else 'rug')
              dev_stats[creator] = {"total": total, "grad": grad, "rate": rate, "rank": rank}

          print(f"Creators in sample: {len(dev_stats)}", flush=True)

          # Build token_stats: map each mint to its creator's dev data
          token_stats = {}
          for c in unique:
              mint = c.get('mint', '')
              creator = c.get('creator', '')
              if not mint or not creator:
                  continue
              s = dev_stats.get(creator, {})
              token_stats[mint] = {
                  "devRate": s.get('rate', 0),
                  "devGrad": s.get('grad', 0),
                  "devTotal": s.get('total', 0),
                  "devRank": s.get('rank', 'new'),
                  "creator": creator[:8]
              }

          # Graduated coins (complete=true filter)
          grads_data = fetch(f"{BASE}/coins?offset=0&limit=50&sort=last_trade_timestamp&order=DESC&includeNsfw=false&complete=true")
          grads = []
          if grads_data is not None:
              raw = grads_data if isinstance(grads_data, list) else grads_data.get('coins', grads_data.get('data', []))
              grads = [{'mint': c.get('mint',''), 'name': c.get('name',''), 'symbol': c.get('symbol',''),
                        'usd_market_cap': c.get('usd_market_cap', 0)} for c in raw]
          print(f"Grads: {len(grads)}", flush=True)

          json.dump({
              "updated": datetime.datetime.utcnow().isoformat(),
              "tokenCount": len(token_stats),
              "devCount": len(dev_stats),
              "tokens": token_stats
          }, open('neet-dev-stats.json', 'w'))

          json.dump({
              "data": grads,
              "last_updated": datetime.datetime.utcnow().isoformat(),
              "count": len(grads)
          }, open('pumpfun-grads.json', 'w'))

          print(f"Done: {len(token_stats)} tokens, {len(dev_stats)} devs, {len(grads)} grads", flush=True)
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "nansen-bot@github.com"
          git config user.name "Nansen Data Bot"
          git add neet-dev-stats.json pumpfun-grads.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "data: update pumpfun dev stats [skip ci]" && git push)
