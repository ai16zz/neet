name: Build & Deploy to Devnet

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'programs/**'

env:
  ANCHOR_VERSION: "0.30.1"
  SOLANA_VERSION: "v1.18.8"
  NODE_VERSION:   "20"

jobs:
  build-and-deploy:
    name: Build Anchor Programs & Deploy to Devnet
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-anchor-0.30.1
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --version ${{ env.ANCHOR_VERSION }} anchor-cli
          anchor --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Restore deploy wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          solana address
          solana balance || true

      - name: Airdrop devnet SOL
        run: |
          BALANCE=$(solana balance | awk '{print $1}' | tr -d 'SOL ')
          echo "Balance: $BALANCE SOL"
          if awk "BEGIN {exit !($BALANCE < 3)}"; then
            for i in 1 2 3; do solana airdrop 2 || true; sleep 5; done
          fi
          solana balance

      - name: Build Anchor programs
        run: anchor build

      - name: Verify .so files
        run: ls -lh target/deploy/*.so

      - name: Deploy to devnet
        run: anchor deploy --provider.cluster devnet

      - name: Initialize protocol
        run: |
          npm install -g ts-node typescript
          DEPLOY_KEYPAIR=~/.config/solana/id.json ts-node scripts/deploy.ts devnet
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

      - name: Print deployed program IDs
        run: |
          echo "=============================="
          echo "NEET-PERP DEVNET PROGRAM IDs"
          echo "=============================="
          grep -A 10 "programs.devnet" Anchor.toml

      - name: Upload .so files
        uses: actions/upload-artifact@v4
        with:
          name: neet-perp-programs
          path: target/deploy/*.so
          retention-days: 30
