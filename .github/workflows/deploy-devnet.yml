name: Build & Deploy to Devnet

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'neet-perp/programs/**'

env:
  ANCHOR_VERSION: "0.31.1"
  SOLANA_VERSION: "v2.3.0"
  NODE_VERSION:   "20"
  DEPLOY_WALLET: "EE9GCrk9U4nbD2x36teZwUnfoyFs66ZjfS9hUHsKAT9E"

jobs:
  build-and-deploy:
    name: Build Anchor Programs & Deploy to Devnet
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: neet-perp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-0.31.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        working-directory: .

      - name: Install system dependencies
        run: sudo apt-get install -y libudev-dev libhidapi-dev
        working-directory: .

      - name: Install Anchor CLI
        run: |
          if [ ! -f ~/.cargo/bin/anchor ]; then
            cargo install --version ${{ env.ANCHOR_VERSION }} anchor-cli
          fi
          anchor --version
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Restore deploy wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          echo "Wallet: $(solana address)"
          BAL=$(solana balance | awk '{print $1}')
          echo "Balance: $BAL SOL"
          if awk "BEGIN {exit !($BAL < 1.5)}"; then
            echo "ERROR: Need at least 1.5 SOL. Fund ${{ env.DEPLOY_WALLET }} at https://faucet.solana.com"
            exit 1
          fi
        working-directory: .

      - name: Build Anchor programs
        run: anchor build

      - name: Verify .so files
        run: |
          echo "Built programs:"
          ls -lh target/deploy/*.so

      # Deploy each program individually.
      # If balance runs out mid-way, partial deploy is saved on-chain.
      # Re-run after topping up wallet to deploy remaining programs.
      - name: Deploy programs to devnet
        run: |
          WALLET=$(solana address)
          # Deploy priority order: core contracts first
          PROGRAMS=(
            neet_clearing_house
            neet_amm
            neet_oracle_adapter
            neet_funding
            neet_liquidation
            neet_insurance
            neet_treasury
          )

          DEPLOYED=()
          SKIPPED=()

          for prog in "${PROGRAMS[@]}"; do
            echo ""
            echo "══════════════════════════════════"
            echo " Deploying: $prog"
            echo "══════════════════════════════════"
            BAL=$(solana balance | awk '{print $1}')
            echo " Balance: $BAL SOL"

            if awk "BEGIN {exit !($BAL < 1.5)}"; then
              echo " ⚠ Insufficient SOL — skipping $prog"
              echo " Fund ${{ env.DEPLOY_WALLET }} at https://faucet.solana.com then re-run"
              SKIPPED+=("$prog")
              continue
            fi

            DEPLOYED_OK=false
            for attempt in 1 2 3; do
              echo " Attempt $attempt..."
              if anchor deploy --provider.cluster devnet --program-name "$prog"; then
                echo " ✓ $prog deployed"
                DEPLOYED+=("$prog")
                DEPLOYED_OK=true
                break
              fi
              echo " ✗ failed — waiting 20s"
              sleep 20
            done

            if [ "$DEPLOYED_OK" = false ]; then
              echo " ERROR: $prog failed after 3 attempts"
              SKIPPED+=("$prog")
            fi
          done

          echo ""
          echo "══════════════════════════════════"
          echo " DEPLOYMENT SUMMARY"
          echo "══════════════════════════════════"
          echo " Deployed (${#DEPLOYED[@]}): ${DEPLOYED[*]}"
          echo " Skipped  (${#SKIPPED[@]}): ${SKIPPED[*]}"
          echo " Final balance: $(solana balance)"

          # Fail if core contracts not deployed
          if [[ ! " ${DEPLOYED[*]} " =~ " neet_clearing_house " ]]; then
            echo "ERROR: neet_clearing_house not deployed — insufficient SOL"
            echo "Add more SOL to ${{ env.DEPLOY_WALLET }} and re-run"
            exit 1
          fi
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

      - name: Initialize protocol
        run: |
          npm install -g ts-node typescript
          DEPLOY_KEYPAIR=~/.config/solana/id.json ts-node scripts/deploy.ts devnet
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

      - name: Print deployed program IDs
        run: |
          echo "=============================="
          echo "NEET-PERP DEVNET PROGRAM IDs"
          echo "=============================="
          grep -A 10 "programs.devnet" Anchor.toml
          echo ""
          echo "Final wallet balance: $(solana balance)"

      - name: Upload .so files
        uses: actions/upload-artifact@v4
        with:
          name: neet-perp-programs
          path: neet-perp/target/deploy/*.so
          retention-days: 30
