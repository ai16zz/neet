name: Build & Deploy to Devnet

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'neet-perp/programs/**'

env:
  ANCHOR_VERSION: "0.31.1"
  SOLANA_VERSION: "v2.3.0"
  NODE_VERSION: "20"
  DEPLOY_WALLET: "EE9GCrk9U4nbD2x36teZwUnfoyFs66ZjfS9hUHsKAT9E"

jobs:
  build-and-deploy:
    name: Build Anchor Programs & Deploy to Devnet
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: neet-perp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-0.31.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        working-directory: .

      - name: Install system dependencies
        run: sudo apt-get install -y libudev-dev libhidapi-dev
        working-directory: .

      - name: Install Anchor CLI
        run: |
          if [ ! -f ~/.cargo/bin/anchor ]; then
            cargo install --version ${{ env.ANCHOR_VERSION }} anchor-cli
          fi
          anchor --version
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Restore deploy wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          echo "Wallet: $(solana address)"
          BAL=$(solana balance | awk '{print $1}')
          echo "Balance: $BAL SOL"
          if awk "BEGIN {exit !($BAL < 0.1)}"; then
            echo "WARNING: Balance very low ($BAL SOL). Proceeding anyway — programs may already be deployed."
          fi
        working-directory: .

      - name: Build Anchor programs
        run: anchor build

      - name: Verify .so files
        run: |
          echo "Built programs:"
          ls -lh target/deploy/*.so

      - name: Deploy programs to devnet
        continue-on-error: true
        run: |
          PROGRAMS=(
            neet_clearing_house
            neet_amm
            neet_oracle_adapter
            neet_funding
            neet_liquidation
            neet_insurance
            neet_treasury
          )
          DEPLOYED=()
          SKIPPED=()
          for prog in "${PROGRAMS[@]}"; do
            echo "Deploying: $prog"
            BAL=$(solana balance | awk '{print $1}')
            if awk "BEGIN {exit !($BAL < 1.5)}"; then
              echo "Skipping $prog - low balance"
              SKIPPED+=("$prog")
              continue
            fi
            DEPLOYED_OK=false
            for attempt in 1 2 3; do
              if anchor deploy --provider.cluster devnet --program-name "$prog"; then
                DEPLOYED+=("$prog")
                DEPLOYED_OK=true
                break
              fi
              sleep 20
            done
            if [ "$DEPLOYED_OK" = false ]; then SKIPPED+=("$prog"); fi
          done
          echo "Deployed: ${DEPLOYED[*]}"
          echo "Skipped:  ${SKIPPED[*]}"
          echo "Balance:  $(solana balance)"
          if [[ ! " ${DEPLOYED[*]} " =~ " neet_clearing_house " ]]; then
            echo "ERROR: neet_clearing_house not deployed"; exit 1
          fi
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

      - name: Initialize protocol
        continue-on-error: true
        run: |
          npm install -g ts-node typescript @solana/web3.js @coral-xyz/anchor @solana/spl-token
          DEPLOY_KEYPAIR=~/.config/solana/id.json ts-node --transpile-only --compiler-options '{"module":"CommonJS","moduleResolution":"node"}' scripts/deploy.ts devnet
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

      - name: Print deployed program IDs
        run: |
          echo "=============================="
          echo "NEET-PERP DEVNET PROGRAM IDs"
          echo "=============================="
          grep -A 10 "programs.devnet" Anchor.toml
          echo "Balance: $(solana balance)"

      - name: Upload .so files
        uses: actions/upload-artifact@v4
        with:
          name: neet-perp-programs
          path: neet-perp/target/deploy/*.so
          retention-days: 30
