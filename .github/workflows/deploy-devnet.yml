name: Build & Deploy to Devnet

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'neet-perp/programs/**'

env:
  ANCHOR_VERSION: "0.31.1"
  SOLANA_VERSION: "v2.3.0"
  NODE_VERSION:   "20"
  # Deploy wallet address (pre-fund this once with 15+ devnet SOL)
  # https://faucet.solana.com  →  EE9GCrk9U4nbD2x36teZwUnfoyFs66ZjfS9hUHsKAT9E
  DEPLOY_WALLET: "EE9GCrk9U4nbD2x36teZwUnfoyFs66ZjfS9hUHsKAT9E"
  MIN_SOL: "13"

jobs:
  build-and-deploy:
    name: Build Anchor Programs & Deploy to Devnet
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: neet-perp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-0.31.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        working-directory: .

      - name: Install system dependencies
        run: sudo apt-get install -y libudev-dev libhidapi-dev
        working-directory: .

      - name: Install Anchor CLI
        run: |
          if [ ! -f ~/.cargo/bin/anchor ]; then
            cargo install --version ${{ env.ANCHOR_VERSION }} anchor-cli
          fi
          anchor --version
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Restore deploy wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          echo "Wallet: $(solana address)"
        working-directory: .

      # Devnet faucet is rate-limited from CI IPs.
      # Pre-fund EE9GCrk9U4nbD2x36teZwUnfoyFs66ZjfS9hUHsKAT9E once:
      #   1. Visit https://faucet.solana.com  (or run locally: solana airdrop 2 --url devnet)
      #   2. Request 2 SOL × 8 times  →  16 SOL total
      # After first deploy the SOL stays locked in program accounts forever.
      # Re-deploys (upgrades) only cost a few lamports in fees.
      - name: Check wallet balance
        run: |
          BAL=$(solana balance | awk '{print $1}')
          echo "Balance: $BAL SOL"
          if awk "BEGIN {exit !($BAL < ${{ env.MIN_SOL }})}"; then
            echo ""
            echo "════════════════════════════════════════════════════════"
            echo "  INSUFFICIENT DEVNET SOL"
            echo "  Need ${{ env.MIN_SOL }}+ SOL, have $BAL SOL"
            echo ""
            echo "  Pre-fund the deploy wallet ONCE:"
            echo "  1. Open https://faucet.solana.com"
            echo "  2. Paste: ${{ env.DEPLOY_WALLET }}"
            echo "  3. Request 2 SOL × 8 times  (devnet only)"
            echo ""
            echo "  OR from your local terminal:"
            echo "    solana airdrop 2 ${{ env.DEPLOY_WALLET }} --url devnet"
            echo "    (repeat 8 times with 30s gaps)"
            echo ""
            echo "  Then re-run this workflow from the Actions tab."
            echo "════════════════════════════════════════════════════════"
            exit 1
          fi
          echo "✓ Sufficient balance for deployment"
        working-directory: .

      - name: Build Anchor programs
        run: anchor build

      - name: Verify .so files
        run: ls -lh target/deploy/*.so

      # Deploy each program individually so we know which one fails
      # and can top-up SOL in between if needed.
      - name: Deploy programs to devnet
        run: |
          WALLET=$(solana address)
          PROGRAMS=(neet_amm neet_clearing_house neet_funding
                    neet_insurance neet_liquidation neet_oracle_adapter
                    neet_treasury)

          for prog in "${PROGRAMS[@]}"; do
            echo ""
            echo "══════════════════════════════════"
            echo " Deploying: $prog"
            echo "══════════════════════════════════"
            BAL=$(solana balance | awk '{print $1}')
            echo " Balance: $BAL SOL"

            for attempt in 1 2 3; do
              echo " Attempt $attempt..."
              if anchor deploy --provider.cluster devnet --program-name "$prog"; then
                echo " ✓ $prog deployed"
                break
              fi
              echo " ✗ failed — waiting 20s"
              sleep 20
              if [ "$attempt" -eq 3 ]; then
                echo "ERROR: $prog failed after 3 attempts"
                exit 1
              fi
            done
          done
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

      - name: Initialize protocol
        run: |
          npm install -g ts-node typescript
          DEPLOY_KEYPAIR=~/.config/solana/id.json ts-node scripts/deploy.ts devnet
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

      - name: Print deployed program IDs
        run: |
          echo "=============================="
          echo "NEET-PERP DEVNET PROGRAM IDs"
          echo "=============================="
          grep -A 10 "programs.devnet" Anchor.toml
          echo ""
          echo "Wallet balance after deploy:"
          solana balance

      - name: Upload .so files
        uses: actions/upload-artifact@v4
        with:
          name: neet-perp-programs
          path: neet-perp/target/deploy/*.so
          retention-days: 30
