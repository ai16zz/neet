name: Build & Deploy to Devnet

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'neet-perp/programs/**'

env:
  ANCHOR_VERSION: "0.30.1"
  SOLANA_VERSION: "v1.18.8"
  NODE_VERSION:   "20"

jobs:
  build-and-deploy:
    name: Build Anchor Programs & Deploy to Devnet
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: neet-perp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-0.30.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        working-directory: .

      - name: Install Anchor CLI
        run: |
          if [ ! -f ~/.cargo/bin/anchor ]; then
            cargo install --version ${{ env.ANCHOR_VERSION }} anchor-cli
          fi
          anchor --version
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Restore deploy wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          solana address
          solana balance || true
        working-directory: .

      - name: Airdrop devnet SOL
        run: |
          BAL=$(solana balance | awk '{print $1}')
          if awk "BEGIN {exit !($BAL < 3)}"; then
            for i in 1 2 3; do solana airdrop 2 || true; sleep 5; done
          fi
          solana balance
        working-directory: .

      # Pin edition2024 crates — Solana 1.18.x ships Rust/Cargo 1.75 which
      # can't parse manifests using "edition = '2024'". These cargo update
      # commands run with the SYSTEM cargo (1.87+) and rewrite Cargo.lock
      # before the platform-tools cargo ever touches the dependency tree.
      - name: Pin deps for Solana 1.18.x / Cargo 1.75 compatibility
        run: |
          cargo update -p blake3      --precise 1.5.4   2>&1 | tail -3 || true
          cargo update -p cpufeatures --precise 0.2.12  2>&1 | tail -3 || true
          cargo update -p digest      --precise 0.10.7  2>&1 | tail -3 || true
          cargo update -p hashbrown   --precise 0.14.5  2>&1 | tail -3 || true
          cargo update -p indexmap    --precise 2.6.0   2>&1 | tail -3 || true
          echo "Lock file after pinning:"
          grep -E "^(name|version) = " Cargo.lock | paste - - | grep -E "blake3|cpufeatures|digest|hashbrown|indexmap"

      - name: Build Anchor programs
        run: anchor build

      - name: Verify .so files
        run: ls -lh target/deploy/*.so

      - name: Deploy to devnet
        run: anchor deploy --provider.cluster devnet

      - name: Initialize protocol
        run: |
          npm install -g ts-node typescript
          DEPLOY_KEYPAIR=~/.config/solana/id.json ts-node scripts/deploy.ts devnet
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com

      - name: Print deployed program IDs
        run: |
          echo "=============================="
          echo "NEET-PERP DEVNET PROGRAM IDs"
          echo "=============================="
          grep -A 10 "programs.devnet" Anchor.toml

      - name: Upload .so files
        uses: actions/upload-artifact@v4
        with:
          name: neet-perp-programs
          path: neet-perp/target/deploy/*.so
          retention-days: 30
