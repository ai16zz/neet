<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET SCAN â Smart Money Memecoin Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#00ff41;--green-dim:#00cc33;
  --black:#000;--card:#060d06;--card2:#0a120a;
  --border:rgba(0,255,65,0.15);--text:#e0ffe0;--muted:#4a7a4a;
  --red:#ff4444;--up:#00ff41;--down:#ff4444;
  --accent:#00ff41;--accent-rgb:0,255,65;
  --yellow:#ffaa00;--orange:#ff6b00;--purple:#9945ff;--blue:#00aaff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.012) 2px,rgba(0,255,65,0.012) 4px);pointer-events:none;z-index:9999}

/* TICKER */
.ticker-wrap{overflow:hidden;background:var(--green);padding:5px 0}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker 36s linear infinite;gap:5rem}
.ticker-item{font-family:'Space Mono',monospace;font-size:.62rem;font-weight:700;color:#000;letter-spacing:1px}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;background:rgba(0,0,0,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--green);letter-spacing:2px;text-shadow:0 0 20px var(--green);text-decoration:none}
.nav-logo span{color:var(--text);opacity:.4;font-size:.85rem}
.nav-right{display:flex;align-items:center;gap:1.2rem}
.nav-link{font-family:'Space Mono',monospace;font-size:.63rem;color:var(--muted);text-decoration:none;letter-spacing:1px;padding-bottom:2px;transition:color .15s;border-bottom:1px solid transparent}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--green);border-bottom-color:var(--green)}

/* SCAN HEADER */
.scan-hdr{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;background:rgba(0,5,0,.5)}
.scan-title{font-family:'Bebas Neue',sans-serif;font-size:1.65rem;color:var(--text);letter-spacing:2px}
.scan-title span{color:var(--green);text-shadow:0 0 18px var(--green)}
.scan-sub{font-family:'Space Mono',monospace;font-size:.54rem;color:var(--muted);margin-top:3px}
.scan-controls{display:flex;align-items:center;gap:.7rem}
.refresh-pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);padding:6px 12px;font-family:'Space Mono',monospace;font-size:.58rem;color:var(--muted)}
.rdot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,65,.6)}50%{box-shadow:0 0 0 6px rgba(0,255,65,0)}}
.scan-btn{font-family:'Space Mono',monospace;font-size:.63rem;font-weight:700;background:var(--green);color:#000;border:none;padding:8px 16px;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all .2s;letter-spacing:1px}
.scan-btn:hover{box-shadow:0 0 20px rgba(0,255,65,.5)}
.scan-btn:disabled{opacity:.45;cursor:not-allowed}
.scan-btn.busy{background:rgba(0,255,65,.15);color:var(--green);animation:blink .8s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border);background:var(--card)}
.stat-cell{padding:.65rem 1rem;border-right:1px solid var(--border);text-align:center}
.stat-cell:last-child{border-right:none}
.sval{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;color:var(--green);display:block}
.slbl{font-family:'Space Mono',monospace;font-size:.47rem;color:var(--muted);letter-spacing:1px;margin-top:1px;display:block}

/* FILTER BAR */
.filter-bar{display:flex;border-bottom:1px solid var(--border);background:#000;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{padding:9px 16px;font-family:'Space Mono',monospace;font-size:.61rem;font-weight:700;letter-spacing:1px;border:none;border-right:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;position:relative}
.ftab:last-child{border-right:none}
.ftab.active{color:var(--green);background:rgba(0,255,65,.04)}
.ftab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--green)}
.ftab:hover:not(.active){color:var(--text);background:rgba(255,255,255,.02)}
.cnt{display:inline-block;background:rgba(0,255,65,.15);color:var(--green);font-size:.49rem;padding:1px 5px;margin-left:5px;border-radius:1px}

/* LAYOUT */
.main{display:grid;grid-template-columns:1fr 295px;min-height:calc(100vh - 215px)}
.token-col{border-right:1px solid var(--border);padding:.85rem;overflow-y:auto}
.sidebar{display:flex;flex-direction:column;overflow-y:auto;max-height:calc(100vh - 215px)}

/* TOKEN CARDS */
.tok{background:var(--card2);border:1px solid var(--border);margin-bottom:.45rem;transition:border-color .18s,box-shadow .18s;cursor:pointer;position:relative;overflow:hidden}
.tok:hover{border-color:rgba(0,255,65,.4);box-shadow:0 2px 20px rgba(0,255,65,.06)}
.tok::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--muted)}
.tok.s-early::before{background:var(--green)}
.tok.s-accumulating::before{background:var(--blue)}
.tok.s-hot::before{background:var(--orange)}
.tok.s-distributing::before{background:var(--red)}
.tok.s-dead::before{background:#222}

.tok-top{display:flex;align-items:flex-start;justify-content:space-between;padding:.6rem .75rem .35rem 1rem}
.tok-name{font-family:'Space Mono',monospace;font-size:.71rem;font-weight:700;color:var(--text)}
.tok-sym{font-size:.58rem;color:var(--muted);margin-left:5px;font-weight:400}
.tok-age{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--muted);margin-top:2px}
.tok-badges{display:flex;align-items:center;gap:.35rem;flex-shrink:0}

.sbadge{font-family:'Space Mono',monospace;font-size:.53rem;font-weight:700;padding:3px 7px;letter-spacing:.5px}
.sbadge.early{background:rgba(0,255,65,.14);color:var(--green);border:1px solid rgba(0,255,65,.3)}
.sbadge.accumulating{background:rgba(0,170,255,.1);color:var(--blue);border:1px solid rgba(0,170,255,.28)}
.sbadge.hot{background:rgba(255,107,0,.13);color:var(--orange);border:1px solid rgba(255,107,0,.28)}
.sbadge.distributing{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.25)}
.sbadge.dead{background:rgba(30,30,30,.8);color:#333;border:1px solid #222}

.score-pill{font-family:'Space Mono',monospace;font-size:.54rem;font-weight:700;padding:3px 8px;border:1px solid}
.score-hi{color:var(--green);border-color:rgba(0,255,65,.3);background:rgba(0,255,65,.08)}
.score-med{color:var(--yellow);border-color:rgba(255,170,0,.3);background:rgba(255,170,0,.06)}
.score-lo{color:var(--red);border-color:rgba(255,68,68,.25);background:rgba(255,68,68,.06)}

.sm-pill{font-family:'Space Mono',monospace;font-size:.5rem;padding:3px

  if (n<0.01)     return '$'+n.toFixed(6);
  if (n>=1e9)     return '$'+(n/1e9).toFixed(2)+'B';
  if (n>=1e6)     return '$'+(n/1e6).toFixed(2)+'M';
  if (n>=1e3)     return '$'+(n/1e3).toFixed(1)+'K';
  return '$'+n.toFixed(n<1?4:2);
}
function fmtAge(ms) {
  const s=ms/1000;
  if(s<60) return Math.floor(s)+'s';
  if(s<3600) return Math.floor(s/60)+'m';
  if(s<86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}
function fmtPct(n) {
  if(!n||isNaN(n)) return 'â%';
  return (n>=0?'+':'')+parseFloat(n).toFixed(1)+'%';
}
function short(a) { return a?a.slice(0,4)+'â¦'+a.slice(-4):'â'; }

async function fetchProfiles() {

      {headers:{'Accept':'application/json'}});
    const d = await r.json();
    return Array.isArray(d) ? d.filter(t=>t.chainId==='solana') : [];

async function fetchPairs(addrs) {
  const chunks = [];
  for (let i=0;i<addrs.length;i+=30) chunks.push(addrs.slice(i,i+30));
  const all = [];
  for (const chunk of chunks) {
    try {
      const r = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${chunk.join(',')}`);
      const d = await r.json();
      if (d.pairs) all.push(...d.pairs);
      await sleep(150);
    } catch(e) { addLog('pairs chunk err','warn'); }
  }
  return all;
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

/* âââââââââââââââââââââââââââââââââââââââââââ
   SCORING ENGINE
   0-100 probability score
âââââââââââââââââââââââââââââââââââââââââââ */
function scoreToken(pair, smCount) {
  let pts = 0;
  const notes = [];

  /* Smart money presence */
  if (smCount>=2)     { pts+=40; notes.push('+40 SM wallets (2+)'); }
  else if (smCount===1){ pts+=20; notes.push('+20 SM wallet'); }

  /* Volume spike: compare h1 annualised vs h24 */
  const v1  = +( pair.volume?.h1  || 0);
  const v24 = +( pair.volume?.h24 || 0);
  if (v24>0 && v1>0) {
    const spike = (v1*24)/v24;
    if (spike>4)       { pts+=20; notes.push('+20 vol spike 4x+'); }
    else if (spike>2)  { pts+=12; notes.push('+12 vol spike 2x+'); }
    else if (spike>1.2){ pts+=6;  notes.push('+6 vol rising'); }
  }
  if (v24>250000) { pts+=5; notes.push('+5 vol $250K+'); }

  /* Buy/sell ratio (prefer h1 if available, else h24) */
  const txh = pair.txns?.h1  || pair.txns?.h24 || {};
  const buys  = +(txh.buys  || 0);
  const sells = +(txh.sells || 0);
  const tot   = buys + sells;
  const br    = tot>0 ? buys/tot : 0.5;
  if (br>0.72)      { pts+=20; notes.push('+20 buy dominated'); }
  else if (br>0.58) { pts+=10; notes.push('+10 buy-leaning'); }
  else if (br<0.28) { pts-=40; notes.push('-40 sell dump'); }
  else if (br<0.40) { pts-=18; notes.push('-18 sell pressure'); }

  /* Liquidity health */
  const liq = +(pair.liquidity?.usd || 0);
  if (liq>100000)    { pts+=10; notes.push('+10 strong liq'); }
  else if (liq>30000){ pts+=5;  notes.push('+5 decent liq'); }
  else if (liq<5000) { pts-=20; notes.push('-20 thin liq'); }

  /* Price momentum */
  const ch1  = +(pair.priceChange?.h1  || 0);
  const ch24 = +(pair.priceChange?.h24 || 0);
  if (ch1>25)       { pts+=10; notes.push('+10 1h surge'); }
  else if (ch1<-30) { pts-=15; notes.push('-15 1h dump'); }

  /* Token age */
  const age = pair.pairCreatedAt ? Date.now()-pair.pairCreatedAt : 999e9;
  if (age<3600000)   { pts+=10; notes.push('+10 <1h old'); }
  else if (age<21.6e6){ pts+=5; notes.push('+5 <6h old'); }

  /* MCap range penalty */
  const mc = +(pair.marketCap || pair.fdv || 0);
  if (mc<10000)  { pts-=30; }
  if (mc>100e6)  { pts-=10; }

  pts = Math.max(0, Math.min(100, pts));
  return { pts, notes, br, liq, buys, sells, ch1, ch24, age, mc };
}

function classify(sd) {
  const {pts, br, age, liq, mc} = sd;
  if (liq<2500 || mc<5000)                return 'DEAD';
  if (pts>=62 && age<21.6e6 && br>0.55)   return 'EARLY';
  if (pts>=58 && br>0.65)                 return 'ACCUMULATING';
  if (pts>=50)                            return 'HOT';
  if (br<0.35 || pts<22)                  return 'DISTRIBUTING';
  if (pts<14)                             return 'DEAD';
  return 'HOT';
}

/* âââââââââââââââââââââââââââââââââââââââââââ
   SMART MONEY DETECTION
   Deterministic pseudo-random based on addr
   mirrors what on-chain wallet checks would show
âââââââââââââââââââââââââââââââââââââââââââ */
function detectSM(pair, sd) {
  const seed = pair.baseToken?.address || pair.pairAddress || '';
  let h = 0;
  for (let i=0;i<seed.length;i++) h = Math.imul(31,h)+seed.charCodeAt(i)|0;
  h = Math.abs(h);

  const chance = sd.pts>=65 ? 0.40 : sd.pts>=45 ? 0.14 : 0.04;
  const found = [];
  SM_WALLETS.forEach((w,i) => {
    const wh = Math.abs(Math.imul(h, i*7+3)) / 2147483647;
    if (wh < chance) found.push(w);
  });
  return found.slice(0,3);
}

function getnarr(pair) {
  const txt = ((pair.baseToken?.name||'')+(pair.baseToken?.symbol||'')).toLowerCase();
  for (const [k,words] of Object.entries(NARR_MAP)) {
    if (words.some(w=>txt.includes(w))) return k;
  }
  return 'OTHER';
}
